<section id="github" class="scroll-mt-24">
  <div class="flex items-center gap-3 mb-10">
    <h3 class="text-3xl font-bold">
      GitHub <span class="text-blue-400">Activity</span>
    </h3>
    <span
      class="px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] font-bold tracking-widest"
      >REAL-TIME</span
    >
  </div>

  <div
    id="github-container"
    class="min-h-[300px] flex items-center justify-center rounded-[2rem] bg-white/5 border border-white/10 backdrop-blur-sm p-8"
  >
    <div id="github-loading" class="text-center">
      <div
        class="w-10 h-10 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"
      ></div>
      <p class="text-gray-400 animate-pulse">Fetching data from GitHub...</p>
    </div>

    <div id="github-content" class="hidden w-full">
      <div class="flex flex-col md:flex-row items-center gap-8 mb-10">
        <img
          id="github-avatar"
          src=""
          alt="Avatar"
          class="w-32 h-32 rounded-3xl border-4 border-white/10 shadow-xl"
        />
        <div class="text-center md:text-left">
          <h4
            id="github-name"
            class="text-2xl font-bold text-white mb-1 italic"
          ></h4>
          <p id="github-username" class="text-blue-400 mb-4"></p>
          <div class="flex gap-4 justify-center md:justify-start">
            <div
              class="bg-white/5 px-4 py-2 rounded-xl border border-white/10 text-center"
            >
              <span id="github-repos-count" class="block text-xl font-bold"
                >0</span
              >
              <span class="text-[10px] text-gray-400 uppercase">Repos</span>
            </div>
            <div
              class="bg-white/5 px-4 py-2 rounded-xl border border-white/10 text-center"
            >
              <span id="github-followers" class="block text-xl font-bold"
                >0</span
              >
              <span class="text-[10px] text-gray-400 uppercase">Followers</span>
            </div>
          </div>
        </div>
      </div>

      <h5
        class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4"
      >
        Latest Repositories
      </h5>
      <div id="github-repos-list" class="grid md:grid-cols-2 gap-4"></div>
    </div>

    <div id="github-error" class="hidden text-center text-red-400">
      <p>⚠️ Gagal mengambil data. Silakan coba lagi nanti.</p>
    </div>
  </div>
</section>

<script>
  $(document).ready(function () {
    const username = "haliza-KA"; // GANTI DENGAN USERNAME GITHUB-MU
    const userUrl = `https://api.github.com/users/${username}`;
    const reposUrl = `https://api.github.com/users/${username}/repos?sort=updated&per_page=4`;

    function fetchGitHubData() {
      // Reset state
      $("#github-loading").removeClass("hidden");
      $("#github-content, #github-error").addClass("hidden");

      // 1. Ambil Data Profil
      $.ajax({
        url: userUrl,
        method: "GET",
        success: function (user) {
          $("#github-avatar").attr("src", user.avatar_url);
          $("#github-name").text(user.name || user.login);
          $("#github-username").text(`@${user.login}`);
          $("#github-repos-count").text(user.public_repos);
          $("#github-followers").text(user.followers);

          // 2. Ambil Data Repositories
          $.ajax({
            url: reposUrl,
            method: "GET",
            success: function (repos) {
              let repoHtml = "";
              repos.forEach((repo) => {
                repoHtml += `
                <a href="${repo.html_url}" target="_blank" class="p-4 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all flex justify-between items-center group">
                  <div>
                    <span class="block font-bold text-white group-hover:text-blue-400">${repo.name}</span>
                    <span class="text-xs text-gray-500">${repo.language || "Code"}</span>
                  </div>
                  <span class="text-xs text-gray-400 italic">View →</span>
                </a>
              `;
              });
              $("#github-repos-list").html(repoHtml);

              // Tampilkan konten dan sembunyikan loading
              $("#github-loading").addClass("hidden");
              $("#github-content").removeClass("hidden");
            },
            error: function () {
              showError();
            },
          });
        },
        error: function () {
          showError();
        },
      });
    }

    function showError() {
      $("#github-loading").addClass("hidden");
      $("#github-error").removeClass("hidden");
    }

    // Panggil fungsi saat halaman siap
    fetchGitHubData();
  });
</script>
